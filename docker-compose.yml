services:
  postgres:
    image: postgres:16-alpine
    container_name: robomind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-robomind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-robomind}
      POSTGRES_DB: ${DB_NAME:-robomind}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-robomind} -d ${DB_NAME:-robomind}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
